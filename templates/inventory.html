{% extends 'base.html' %}

{% block content %}
<div class="inventory-container">
    <section class="form-section">
        <h2>Register New Product</h2>
        <form action="{{ url_for('main.add_product') }}" method="POST" class="inventory-form">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="sku">SKU Code</label>
                <input type="text" id="sku" name="sku" required>
            </div>
            <div class="form-group">
                <label for="quantity">Initial Quantity</label>
                <input type="number" id="quantity" name="quantity" min="0" required>
            </div>
            <div class="form-group">
                <label for="price">Unit Price (₹)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required>
            </div>
            <button type="submit" class="btn btn-primary">Commit to Inventory</button>
        </form>
    </section>

    <section class="table-section">
        <h2>Current Stock Holdings</h2>
        <table class="inventory-table">
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Name</th>
                    <th>In Stock</th>
                    <th>Unit Price (₹)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr id="row-{{ product.id }}">
                    <form action="{{ url_for('main.update_product', id=product.id) }}" method="POST">
                        <td>{{ product.sku }}</td>
                        <td><input type="text" name="name" value="{{ product.name }}" class="table-input"></td>
                        <td><input type="number" name="quantity" value="{{ product.quantity }}" min="0" class="table-input code-input"></td>
                        <td><input type="number" name="price" value="{{ product.price }}" step="0.01" min="0" class="table-input code-input"></td>
                        <td>
                            <button type="submit" class="btn btn-save">Save</button>
                            <button type="button" class="btn btn-delete" onclick="deleteRow('{{ product.id }}')">Delete</button>
                        </td>
                    </form>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" style="text-align: center;">No items found in system database storage.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </section>
</div>
{% endblock %}
