<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --panel-color: #ffffff;
            --text-dark: #2c3e50;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --border-color: #dcdde1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: var(--text-dark);
            color: #fff;
            padding: 1rem 2rem;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-brand {
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }

        .main-content {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .flash {
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .flash.success { background-color: #d4edda; color: #155724; }
        .flash.error { background-color: #f8d7da; color: #721c24; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--panel-color);
            padding: 1.5rem;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card h3 { margin-top: 0; font-size: 0.9rem; text-transform: uppercase; color: #7f8c8d; }
        .metric-val { font-size: 2rem; font-weight: bold; margin: 0.5rem 0 0 0; }
        .alert-card { border-left: 5px solid var(--accent-red); }

        .inventory-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .form-section, .table-section {
            background: var(--panel-color);
            padding: 1.5rem;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .inventory-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group input {
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .inventory-table th, .inventory-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .inventory-table th { background-color: #f8f9fa; }

        .table-input {
            width: 90%;
            padding: 0.4rem;
            border: 1px solid transparent;
            background: transparent;
        }

        .table-input:focus {
            border-color: var(--accent-blue);
            background: #fff;
            outline: none;
        }

        .code-input { max-width: 80px; }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary { background: var(--accent-blue); color: white; padding: 0.65rem 1rem; }
        .btn-save { background: var(--accent-green); color: white; }
        .btn-delete { background: var(--accent-red); color: white; margin-left: 0.25rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('main.dashboard') }}" class="nav-brand">IMS Portal</a>
            <ul class="nav-links">
                <li><a href="{{ url_for('main.dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('main.inventory') }}">Inventory</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script>
        function deleteRow(productId) {
            if (confirm("Are you sure you want to permanently purge this item from records?")) {
                fetch(`/inventory/delete/${productId}`, {
                    method: 'DELETE',
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const elementToRemove = document.getElementById(`row-${productId}`);
                        if (elementToRemove) {
                            elementToRemove.remove();
                        }
                    } else {
                        alert("Error handling request execution: " + data.message);
                    }
                })
                .catch(error => {
                    console.error('Fetch operation failed:', error);
                    alert("Network error processing dynamic deletion.");
                });
            }
        }
    </script>
</body>
</html>
