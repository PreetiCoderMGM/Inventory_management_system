<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Inventory Management</title>
    <style>
        :root { --bg-main: #f4f6f9; --panel-color: #ffffff; --text-dark: #2c3e50; --accent-blue: #3498db; --accent-red: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; padding: 0; }
        .navbar { background-color: var(--text-dark); color: #fff; padding: 1rem 2rem; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .nav-brand { font-size: 1.4rem; font-weight: bold; text-decoration: none; color: #fff; }
        .nav-links { list-style: none; display: flex; gap: 1.5rem; margin: 0; padding: 0; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 500; }
        .main-content { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
        .card { background: var(--panel-color); padding: 1.5rem; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; font-size: 0.9rem; text-transform: uppercase; color: #7f8c8d; }
        .metric-val { font-size: 2rem; font-weight: bold; margin: 0.5rem 0 0 0; }
        .alert-card { border-left: 5px solid var(--accent-red); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">IMS Portal</a>
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/inventory">Inventory</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-header">
            <h1>System Metrics Overview</h1>
        </div>

        <div class="metrics-grid">
            <div class="card">
                <h3>Total Unique Items</h3>
                <p class="metric-val" id="total-products">...</p>
            </div>
            <div class="card">
                <h3>Total Stock Pieces</h3>
                <p class="metric-val" id="total-stock">...</p>
            </div>
            <div class="card">
                <h3>Cumulative Valuation</h3>
                <p class="metric-val" id="total-value">₹...</p>
            </div>
            <div class="card alert-card">
                <h3>Low Stock Flags (≤ 5 units)</h3>
                <p class="metric-val" id="low-stock">...</p>
            </div>
        </div>
    </main>

    <script>
        // Fetch data from the API Layer upon page load
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/metrics')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('total-products').innerText = data.total_products;
                    document.getElementById('total-stock').innerText = data.total_stock;
                    document.getElementById('total-value').innerText = `₹${data.total_value}`;
                    document.getElementById('low-stock').innerText = data.low_stock;
                })
                .catch(error => console.error('Error fetching metrics:', error));
        });
    </script>
</body>
</html>
